name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        shell: powershell
        run: |
          Copy-Item "target/release/band-heart-rate.exe" -Destination "band-heart-rate-${{ steps.version.outputs.version }}-windows-x64.exe"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: band-heart-rate-${{ steps.version.outputs.version }}-windows-x64.exe
          token: ${{ secrets.GITHUB_TOKEN }}